name: Deploy Dev Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - frontend/**

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-1
jobs:
  deploy:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/github-actions-ssm-role
        aws-region: ${{ env.AWS_REGION }}
        role-session-name: GitHubActionsWorkflow

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        cache-dependency-path: frontend/package-lock.json
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci
    
    - name: Build project
      run: npm run build
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL }}

    - name: Copy file
      run: |
        # Update function code
        aws s3 rm s3://partiburo/prod/frontend/dist/ --recursive
        aws s3 cp ./dist/ s3://partiburo/prod/frontend/dist/ --recursive
    
    - name: Restart
      run: |
        aws ssm send-command \
        --document-name "AWS-RunShellScript" \
        --instance-ids "${{ secrets.FRONTEND_ID }}" \
        --parameters commands='[
          "sudo systemctl stop nginx",
          "sudo rm -rf /var/www/html/*",
          "aws s3 cp s3://partiburo/prod/frontend/dist/ /var/www/html/ --recursive",
          "sudo systemctl restart nginx"
        ]' \
        --output text
